    /* Lightbox Styles */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 9999;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      align-items: center;
      justify-content: center;
    }
    
    .lightbox.active {
      display: flex;
    }
    
    .lightbox-content {
      position: relative;
      max-width: 90%;
      max-height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .lightbox img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
    }
    
    .lightbox-close,
    .lightbox-prev,
    .lightbox-next {
      position: absolute;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border: none;
      font-size: 2rem;
      cursor: pointer;
      padding: 1rem;
      transition: background 0.3s;
      z-index: 10000;
    }
    
    .lightbox-close:hover,
    .lightbox-prev:hover,
    .lightbox-next:hover {
      background: rgba(255, 255, 255, 0.2);
    }
    
    .lightbox-close {
      top: 20px;
      right: 20px;
      font-size: 2.5rem;
      line-height: 1;
      padding: 0.5rem 1rem;
    }
    
    .lightbox-prev {
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
    }
    
    .lightbox-next {
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
    }
    
    .lightbox-counter {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 0.5rem;
      font-size: 0.875rem;
    }

  <script>
    // Lightbox functionality
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxCurrent = document.getElementById('lightbox-current');
    const lightboxTotal = document.getElementById('lightbox-total');
    const galleryItems = document.querySelectorAll('.gallery-item');
    
    let currentIndex = 0;
    const images = [
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/1-11-1030x577.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/2-9-1030x686.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/3-12-1030x686.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/4-14-1030x686.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/5-13-1030x686.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/7-13-1030x696.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/10-15-1030x698.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/11-14-1030x693.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/12-121-9-1030x686.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/14-13-1030x686.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/15-8-1030x703.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/16-121-9-1030x686.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/17-14-1030x686.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/18-15-1030x686.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/19-14-1030x686.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/21-9-1030x686.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/22-6-1030x686.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/26-5-1030x686.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/27-3-1030x686.jpg',
      'https://wordpress-1007224-3553830.cloudwaysapps.com/wp-content/uploads/2025/07/30-1030x686.jpg'
    ];
    
    lightboxTotal.textContent = images.length;
    
    function openLightbox(index) {
      currentIndex = index;
      lightboxImg.src = images[currentIndex];
      lightboxCurrent.textContent = currentIndex + 1;
      lightbox.classList.add('active');
    }
    
    function closeLightbox() {
      lightbox.classList.remove('active');
    }
    
    function showNext() {
      currentIndex = (currentIndex + 1) % images.length;
      lightboxImg.src = images[currentIndex];
      lightboxCurrent.textContent = currentIndex + 1;
    }
    
    function showPrev() {
      currentIndex = (currentIndex - 1 + images.length) % images.length;
      lightboxImg.src = images[currentIndex];
      lightboxCurrent.textContent = currentIndex + 1;
    }
    
    // Event listeners
    galleryItems.forEach(item => {
      item.addEventListener('click', function() {
        const index = parseInt(this.getAttribute('data-index'));
        openLightbox(index);
      });
    });
    
    document.querySelector('.lightbox-close').addEventListener('click', closeLightbox);
    document.querySelector('.lightbox-next').addEventListener('click', showNext);
    document.querySelector('.lightbox-prev').addEventListener('click', showPrev);
    
    // Keyboard navigation
    document.addEventListener('keydown', function(e) {
      if (!lightbox.classList.contains('active')) return;
      
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowRight') showNext();
      if (e.key === 'ArrowLeft') showPrev();
    });
    
    // Close on background click
    lightbox.addEventListener('click', function(e) {
      if (e.target === lightbox) closeLightbox();
    });
  </script>
